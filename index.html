<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reflex Rush</title>
<meta name="theme-color" content="#111827">
<link rel="manifest" href="manifest.json">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #111827, #1f2937);
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

.container {
    width: 95%;
    max-width: 450px;
    text-align: center;
}

h1 {
    font-size: 2.8rem;
    margin-bottom: 10px;
}

p {
    opacity: 0.8;
}

.score-box {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
    font-size: 1.1rem;
}

#gameArea {
    position: relative;
    width: 100%;
    height: 420px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.1);
}

.target {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #22c55e;
    cursor: pointer;
    transition: transform 0.1s;
    box-shadow: 0 0 20px rgba(34,197,94,0.6);
}

.target:active {
    transform: scale(0.9);
}

button {
    margin-top: 20px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    background: #2563eb;
    color: white;
    font-size: 1rem;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.footer {
    margin-top: 20px;
    font-size: 0.85rem;
    opacity: 0.7;
}
</style>
</head>
<body>

<div class="container">
    <h1>Reflex Rush</h1>
    <p>Tap the green circles before they disappear!</p>

    <div class="score-box">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="time">30</span>s</div>
        <div>Best: <span id="best">0</span></div>
    </div>

    <div id="gameArea"></div>

    <button id="startBtn">Start Game</button>

    <div class="footer">
        Offline Supported • Lightweight • Play Store Friendly
    </div>
</div>

<script>
const gameArea = document.getElementById('gameArea');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const bestEl = document.getElementById('best');
const startBtn = document.getElementById('startBtn');

let score = 0;
let timeLeft = 30;
let gameRunning = false;
let timer;
let targetTimeout;

bestEl.textContent = localStorage.getItem('bestScore') || 0;

function createTarget() {
    if (!gameRunning) return;

    const target = document.createElement('div');
    target.classList.add('target');

    const maxX = gameArea.clientWidth - 70;
    const maxY = gameArea.clientHeight - 70;

    target.style.left = Math.random() * maxX + 'px';
    target.style.top = Math.random() * maxY + 'px';

    target.addEventListener('click', () => {
        score++;
        scoreEl.textContent = score;
        target.remove();
        createTarget();
    });

    gameArea.innerHTML = '';
    gameArea.appendChild(target);

    targetTimeout = setTimeout(() => {
        if (target.parentNode) {
            target.remove();
            createTarget();
        }
    }, 900);
}

function startGame() {
    score = 0;
    timeLeft = 30;
    gameRunning = true;

    scoreEl.textContent = score;
    timeEl.textContent = timeLeft;

    startBtn.disabled = true;
    startBtn.textContent = 'Game Running';

    createTarget();

    timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;

        if (timeLeft <= 0) {
            endGame();
        }
    }, 1000);
}

function endGame() {
    gameRunning = false;
    clearInterval(timer);
    clearTimeout(targetTimeout);

    gameArea.innerHTML = '';

    let best = localStorage.getItem('bestScore') || 0;

    if (score > best) {
        localStorage.setItem('bestScore', score);
        best = score;
    }

    bestEl.textContent = best;

    alert('Game Over! Your score: ' + score);

    startBtn.disabled = false;
    startBtn.textContent = 'Play Again';
}

startBtn.addEventListener('click', startGame);

if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
