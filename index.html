<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dalton Rush</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
color:white;
min-height:100vh;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.screen{
display:none;
width:100%;
min-height:100vh;
padding:20px;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

.menu-title{
font-size:3rem;
margin-bottom:10px;
text-align:center;
}

.subtitle{
opacity:0.8;
margin-bottom:30px;
text-align:center;
}

.menu-btn,
button{
width:90%;
max-width:320px;
padding:16px;
margin:10px 0;
background:#2563eb;
border:none;
border-radius:14px;
color:white;
font-size:1rem;
cursor:pointer;
}

.menu-btn:hover,
button:hover{
opacity:0.9;
}

#gameContainer{
width:100%;
max-width:500px;
}

.topbar{
display:flex;
justify-content:space-between;
margin-bottom:15px;
font-size:1rem;
}

#gameArea{
position:relative;
width:100%;
height:420px;
background:rgba(255,255,255,0.08);
border-radius:20px;
overflow:hidden;
border:2px solid rgba(255,255,255,0.1);
}

.target{
position:absolute;
border-radius:50%;
background:#22c55e;
box-shadow:0 0 20px rgba(34,197,94,0.7);
cursor:pointer;
transition:transform 0.1s;
}

.target:active{
transform:scale(0.9);
}

.mode-title{
margin-bottom:15px;
font-size:1.1rem;
text-align:center;
}

.badges{
margin-top:20px;
text-align:center;
font-size:0.9rem;
opacity:0.9;
}

.footer{
margin-top:20px;
opacity:0.6;
font-size:0.8rem;
text-align:center;
}

.toggle{
margin-top:15px;
}

.splash-logo{
font-size:3rem;
font-weight:bold;
margin-bottom:20px;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div id="splash" class="screen active">
<div class="splash-logo">DALTON RUSH</div>
<p>Loading...</p>
</div>

<div id="menu" class="screen">
<h1 class="menu-title">Dalton Rush</h1>
<p class="subtitle">Fast reflexes win.</p>

<button class="menu-btn" onclick="startGame('classic')">Classic Mode</button>
<button class="menu-btn" onclick="startGame('speed')">Speed Mode</button>
<button class="menu-btn" onclick="startGame('sudden')">Sudden Death</button>
<button class="menu-btn" onclick="startGame('zen')">Zen Mode</button>

<button class="menu-btn toggle" onclick="toggleSound()">
Toggle Sound
</button>

<div class="badges" id="badgeArea"></div>

<div class="footer">
Powered by Dalton Mobile
</div>
</div>

<div id="gameScreen" class="screen">

<div id="gameContainer">

<div class="topbar">
<div>Score: <span id="score">0</span></div>
<div>Time: <span id="time">30</span></div>
<div>Lives: <span id="lives">3</span></div>
</div>

<div class="topbar">
<div>Combo: <span id="combo">0</span></div>
<div>Best: <span id="best">0</span></div>
</div>

<div id="gameArea"></div>

<button onclick="returnMenu()">Return To Menu</button>

</div>
</div>

<script>
const splash = document.getElementById('splash');
const menu = document.getElementById('menu');
const gameScreen = document.getElementById('gameScreen');
const gameArea = document.getElementById('gameArea');

const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const livesEl = document.getElementById('lives');
const comboEl = document.getElementById('combo');
const bestEl = document.getElementById('best');
const badgeArea = document.getElementById('badgeArea');

let score = 0;
let timeLeft = 30;
let lives = 3;
let combo = 0;
let gameRunning = false;
let timer;
let targetTimeout;
let soundEnabled = true;
let currentMode = 'classic';
let targetSpeed = 900;
let targetSize = 70;

bestEl.textContent = localStorage.getItem('bestScore') || 0;

setTimeout(() => {
showScreen(menu);
},2000);

function showScreen(screen){
[splash,menu,gameScreen].forEach(s=>s.classList.remove('active'));
screen.classList.add('active');
}

function playBeep(freq,duration){
if(!soundEnabled) return;

const ctx = new(window.AudioContext||window.webkitAudioContext)();
const osc = ctx.createOscillator();
const gain = ctx.createGain();

osc.type='sine';
osc.frequency.value=freq;
osc.connect(gain);
gain.connect(ctx.destination);
osc.start();

setTimeout(()=>{
osc.stop();
ctx.close();
},duration);
}

function toggleSound(){
soundEnabled=!soundEnabled;
alert(soundEnabled ? 'Sound ON' : 'Sound OFF');
}

function startGame(mode){
currentMode = mode;

score = 0;
timeLeft = mode === 'zen' ? 999 : 30;
lives = 3;
combo = 0;

gameRunning = true;

scoreEl.textContent = score;
timeEl.textContent = timeLeft;
livesEl.textContent = lives;
comboEl.textContent = combo;

showScreen(gameScreen);

if(mode === 'speed'){
targetSpeed = 500;
}
else if(mode === 'sudden'){
lives = 1;
livesEl.textContent = lives;
targetSpeed = 700;
}
else{
targetSpeed = 900;
}

createTarget();

if(mode !== 'zen'){

timer = setInterval(()=>{

timeLeft--;
timeEl.textContent = timeLeft;

if(timeLeft <= 5){
playBeep(800,100);
}

if(timeLeft <= 0){
endGame();
}

},1000);
}
}

function createTarget(){

if(!gameRunning) return;

const target = document.createElement('div');

target.classList.add('target');

const difficulty = Math.floor(score / 10);

targetSize = Math.max(35,70 - difficulty * 2);

const speed = Math.max(300,targetSpeed - difficulty * 30);

const maxX = gameArea.clientWidth - targetSize;
const maxY = gameArea.clientHeight - targetSize;

const x = Math.random() * maxX;
const y = Math.random() * maxY;

target.style.width = targetSize + 'px';
target.style.height = targetSize + 'px';
target.style.left = x + 'px';
target.style.top = y + 'px';

let clicked = false;

target.addEventListener('click',()=>{

clicked = true;

playBeep(500,80);

if(navigator.vibrate){
navigator.vibrate(30);
}

score++;
combo++;

if(combo >= 5){
score += 2;
}

scoreEl.textContent = score;
comboEl.textContent = combo;

unlockBadges();

clearTimeout(targetTimeout);

target.remove();

createTarget();
});

gameArea.innerHTML='';
gameArea.appendChild(target);


 targetTimeout = setTimeout(()=>{

if(!clicked){
combo = 0;
comboEl.textContent = combo;

lives--;
livesEl.textContent = lives;

playBeep(200,150);

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

if(lives <= 0){
endGame();
return;
}

createTarget();
}

},speed);
}

function unlockBadges(){

const badges = [];

if(score >= 10) badges.push('Fast Fingers');
if(score >= 25) badges.push('Combo King');
if(score >= 50) badges.push('Reflex Master');
if(score >= 100) badges.push('Dalton Legend');

badgeArea.innerHTML = badges.join('<br>');
}

function endGame(){

gameRunning = false;

clearInterval(timer);
clearTimeout(targetTimeout);

gameArea.innerHTML='';

playBeep(120,400);

let best = localStorage.getItem('bestScore') || 0;

if(score > best){
localStorage.setItem('bestScore',score);
best = score;
}

bestEl.textContent = best;

alert('Game Over! Score: ' + score);

showScreen(menu);
}

function returnMenu(){
clearInterval(timer);
clearTimeout(targetTimeout);
gameRunning=false;
showScreen(menu);
}

const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
dx:(Math.random()-0.5),
dy:(Math.random()-0.5)
});
}

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,0.5)';
ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
});

requestAnimationFrame(animateParticles);
}

animateParticles();

window.addEventListener('resize',()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

</script>

</body>
</html>
